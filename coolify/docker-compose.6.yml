---
# Stack: wizard (front door) + Ghost 6 + MySQL + traffic analytics (Tinybird) + ActivityPub + activitypub-migrate.
# Build context for wizard is the repo root (Coolify uses --project-directory to the clone).
# - wizard: the only publicly-exposed service. Absorbs the old mysql-app-init (app user + GRANTs + multiple DBs).
#   Healthy only once DB bootstrap + TINYBIRD_* setup are both done; other services gate on that via depends_on.
#   Until TINYBIRD_* is set, serves a setup UI on every path; once set, reverse-proxies /.ghost/analytics/* →
#   traffic-analytics:3000 (prefix stripped) and everything else → ghost:2368. In Coolify, point the site FQDN
#   (e.g. godutch.us) at this service; ghost + traffic-analytics stay internal.
# - mysql: stock mysql:8 image (no custom server image).
# - activitypub-migrate: applies ActivityPub DB migrations after wizard has bootstrapped the DB.
services:
  wizard:
    build:
      context: .
      dockerfile: wizard/Dockerfile
      args:
        GHOST_VERSION: ${GHOST_VERSION:-6-alpine}
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVICE_URL_WIZARD_3989: ${SERVICE_URL_WIZARD_3989}
      url: ${SERVICE_URL_WIZARD}
      PROXY_GHOST_UPSTREAM: http://ghost:2368
      PROXY_ANALYTICS_UPSTREAM: http://traffic-analytics:3000
      # DB bootstrap (replaces the old mysql-app-init sidecar): idempotent CREATE USER + ALTER + DB + GRANT.
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_ROOT_PASSWORD: ${SERVICE_PASSWORD_MYSQLROOT}
      MYSQL_USER: ${SERVICE_USER_MYSQL}
      MYSQL_PASSWORD: ${SERVICE_PASSWORD_MYSQL}
      MYSQL_MULTIPLE_DATABASES: ${MYSQL_MULTIPLE_DATABASES:-activitypub}
      # Wizard flips to proxy mode when all five TINYBIRD_* env vars are set (or WIZARD_SKIP=1).
      TINYBIRD_API_URL: ${TINYBIRD_API_URL:-}
      TINYBIRD_WORKSPACE_ID: ${TINYBIRD_WORKSPACE_ID:-}
      TINYBIRD_ADMIN_TOKEN: ${TINYBIRD_ADMIN_TOKEN:-}
      TINYBIRD_TRACKER_TOKEN: ${TINYBIRD_TRACKER_TOKEN:-}
      TINYBIRD_TRACKER_ENDPOINT: ${TINYBIRD_TRACKER_ENDPOINT:-}
      WIZARD_SKIP: ${WIZARD_SKIP:-}
    expose:
      - "3989"
    volumes:
      - tinybird_home:/home/tinybird
    restart: unless-stopped
    # Docker health = (DB bootstrap done) AND (proxy mode). Other services gate on wizard: service_healthy.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3989/__wizard/health"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 30s
  ghost:
    image: ghost:${GHOST_VERSION:-6-alpine}
    environment:
      url: ${SERVICE_URL_WIZARD}
      NODE_ENV: production
      admin__url: ${SERVICE_URL_WIZARD}
      database__client: mysql
      database__connection__host: mysql
      database__connection__user: ${SERVICE_USER_MYSQL}
      database__connection__password: ${SERVICE_PASSWORD_MYSQL}
      database__connection__database: ${MYSQL_DATABASE-ghost}
      mail__transport: SMTP
      mail__from: ${MAIL_FROM}
      mail__options__auth__pass: ${MAIL_OPTIONS_AUTH_PASS}
      mail__options__auth__user: ${MAIL_OPTIONS_AUTH_USER}
      mail__options__secure: ${MAIL_OPTIONS_SECURE:-true}
      mail__options__port: ${MAIL_OPTIONS_PORT:-465}
      mail__options__service: ${MAIL_OPTIONS_SERVICE:-Mailgun}
      mail__options__host: ${MAIL_OPTIONS_HOST}
      # Same origin as `url` — required for browser CORS. Proxy must rewrite /.ghost/analytics/* → /api/* on traffic-analytics:3000
      tinybird__tracker__endpoint: ${TINYBIRD_TRACKER_ENDPOINT:-${SERVICE_URL_WIZARD}/.ghost/analytics/api/v1/page_hit}
      labs__publicAPI: "true"
      tinybird__adminToken: ${TINYBIRD_ADMIN_TOKEN}
      tinybird__workspaceId: ${TINYBIRD_WORKSPACE_ID}
      tinybird__tracker__datasource: analytics_events
      # Admin/stats read from Tinybird API (not via traffic-analytics)
      tinybird__stats__endpoint: ${TINYBIRD_API_URL:-https://api.tinybird.co}
    volumes:
      - 'ghost-content-data:/var/lib/ghost/content'
    depends_on:
      mysql:
        condition: service_healthy
      wizard:
        condition: service_healthy
      activitypub:
        condition: service_started
        required: false
  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_USER: ${SERVICE_USER_MYSQL}
      MYSQL_PASSWORD: ${SERVICE_PASSWORD_MYSQL}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${SERVICE_PASSWORD_MYSQLROOT}
      MYSQL_MULTIPLE_DATABASES: activitypub
    volumes:
      - 'ghost-mysql-data:/var/lib/mysql'
    healthcheck:
      test: mysqladmin ping -p$$MYSQL_ROOT_PASSWORD -h 127.0.0.1
      interval: 1s
      start_period: 30s
      start_interval: 5s
      timeout: 20s
      retries: 10
  traffic-analytics:
    image: ghost/traffic-analytics:1.0.154@sha256:6a77d76a98558e0355160ef5eea4f465a1545441d5690e9fa01697b66b0505ef
    restart: always
    depends_on:
      wizard:
        condition: service_healthy
    expose:
      - "3000"
    volumes:
      - traffic_analytics_data:/data
    environment:
      NODE_ENV: production
      # Behind Traefik/Coolify; client IP from X-Forwarded-For (see TryGhost/TrafficAnalytics)
      TRUST_PROXY: "true"
      PROXY_TARGET: ${TINYBIRD_API_URL:-https://api.tinybird.co}/v0/events
      SALT_STORE_TYPE: ${SALT_STORE_TYPE:-file}
      SALT_STORE_FILE_PATH: /data/salts.json
      TINYBIRD_TRACKER_TOKEN: ${TINYBIRD_TRACKER_TOKEN:-}
      LOG_LEVEL: debug
  activitypub:
    image: ghcr.io/tryghost/activitypub:1.1.0@sha256:39c212fe23603b182d68e67d555c6b9b04b1e57459dfc0bef26d6e4980eb04d1
    restart: always
    expose:
      - "8080"
    volumes:
      - 'ghost-content-data:/opt/activitypub/content'
    environment:
      NODE_ENV: production
      MYSQL_HOST: mysql
      MYSQL_USER: ${SERVICE_USER_MYSQL}
      MYSQL_PASSWORD: ${SERVICE_PASSWORD_MYSQL}
      MYSQL_DATABASE: activitypub
      LOCAL_STORAGE_PATH: /opt/activitypub/content/images/activitypub
      LOCAL_STORAGE_HOSTING_URL: ${SERVICE_URL_WIZARD}/content/images/activitypub
    depends_on:
      mysql:
        condition: service_healthy
      activitypub-migrate:
        condition: service_completed_successfully

  activitypub-migrate:
    image: ghcr.io/tryghost/activitypub-migrations:1.1.0@sha256:b3ab20f55d66eb79090130ff91b57fe93f8a4254b446c2c7fa4507535f503662
    environment:
      MYSQL_DB: mysql://${SERVICE_USER_MYSQL}:${SERVICE_PASSWORD_MYSQL}@tcp(mysql:3306)/activitypub
    depends_on:
      mysql:
        condition: service_healthy
      wizard:
        condition: service_healthy
    restart: no

volumes:
  caddy_data:
  caddy_config:
  ghost-content-data:
  ghost-mysql-data:
  tinybird_home:
  traffic_analytics_data:
